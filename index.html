<!DOCTYPE html>
<html lang="es">
    <head>
        <title> ALCALDIA DE MARQUETALIA </title>  
    
        <style> 
             body 
             { 
              font-family: Arial;
              margin: 0;
              background: linear-gradient(to right, #e3f2fd, #f1f8e9);
              text-align:  center; 
             }

             .header
             { 
                background-color: #0d47a1;
                color: white;
                padding: 20px;
             }

             .card 
              {
                background: white;
                width: 380px;
                margin: 40px auto;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2)
             }

             input, section, textarea {
                width: 90%;
                padding: 10px;
                margin: 8px 0;
                border:  1px solid #ccc;
             }

             button 
              {
                background-color: #0d47a1;
                 color: white;
                 padding: 10px;
                 width: 95%;
                 border: none;
                 border-radius: 8px;
                 cursor: pointer;
              }

             button:hover 
             {
             background-color: #08306b;
             }
 
             .footer 
              {
              font-size: 12px;
              color: gray;
              margin-top: 15px;
              }
              
          </style>
     </head>

     <body>

     <div class="header">
        <h1>Alcaldía de Marquetalia</h1>
        <p>Sistema de Atención al Ciudadano</p>
     </div>

     <div class="card">
        <h3>Registro de Solicitudes 📝</h3>

        <form>
            <input type="text" placeholder="Nombre completo" required>

            <select>
                <option>Tipo de solicitud</option>
                <option>Peticiones</option>
                <option>Quejas</option>
                <option>Reclamos</option>
                <option>Información</option>
            </select>

            <textarea placeholder="Describe tu solicitud..."></textarea>

            <button type="submit">Enviar</button>
        </form>

        <div class="footer">
            Alcaldía de Marquetalia - Atención al ciudadano
        </div>
    </div>

 </body>


        </style>
      </head>
</html>
